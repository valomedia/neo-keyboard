name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run SwiftLint
        run: scripts/lint

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build app and keyboard extension
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "Neo Keyboard.xcodeproj" \
            -scheme "German Neo" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO

  unit-tests:
    name: Unit tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select iOS simulator
        id: simulator
        run: |
          set -euo pipefail
          device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/{print $2; exit}')"
          if [ -z "$device_id" ]; then
            device_id="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')"
          fi
          if [ -z "$device_id" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "destination=platform=iOS Simulator,id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "Neo Keyboard.xcodeproj" \
            -scheme "German Neo" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO
